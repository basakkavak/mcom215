<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Home Jeopardy — MCOM 215</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0e2e;
    color: #fff;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    letter-spacing: 0.08em;
    color: #f5c842;
    text-shadow: 0 2px 12px rgba(245,200,66,0.3);
    margin-bottom: 6px;
    text-align: center;
  }

  .subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  /* Score bar */
  .score-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .team {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 10px 20px;
    text-align: center;
    min-width: 120px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .team:hover { background: rgba(255,255,255,0.12); }
  .team.active { border-color: #f5c842; background: rgba(245,200,66,0.08); }

  .team-name {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.5);
    margin-bottom: 4px;
  }

  .team-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: #f5c842;
    letter-spacing: 0.05em;
  }

  .team-btns {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-top: 6px;
  }

  .team-btns button {
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    border-radius: 4px;
    width: 22px;
    height: 22px;
    font-size: 14px;
    cursor: pointer;
    line-height: 1;
    transition: background 0.1s;
  }

  .team-btns button:hover { background: rgba(255,255,255,0.2); }

  /* Board */
  .board {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 1100px;
  }

  .cat-header {
    background: #1a2060;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 14px 8px;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(0.85rem, 1.5vw, 1.1rem);
    letter-spacing: 0.06em;
    color: #d0d8ff;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tile {
    background: #1535a8;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    min-height: 80px;
    aspect-ratio: auto;
  }

  .tile:hover:not(.used) {
    background: #1e47c9;
    transform: translateY(-1px);
  }

  .tile .amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    color: #f5c842;
    text-shadow: 0 1px 6px rgba(245,200,66,0.4);
    letter-spacing: 0.04em;
  }

  .tile.used {
    background: #0d1540;
    cursor: default;
    border-color: rgba(255,255,255,0.04);
  }

  .tile.used .amount { opacity: 0; }

  /* Modal */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 8, 30, 0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }

  .overlay.show { display: flex; }

  .modal {
    background: #1535a8;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 40px 48px;
    max-width: 680px;
    width: 100%;
    text-align: center;
    position: relative;
  }

  .modal-cat {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }

  .modal-points {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    color: #f5c842;
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }

  .modal-clue {
    font-size: clamp(1.1rem, 2.5vw, 1.55rem);
    line-height: 1.55;
    font-style: italic;
    color: #fff;
    margin-bottom: 28px;
    min-height: 60px;
  }

  .modal-answer {
    background: rgba(245,200,66,0.12);
    border: 1px solid rgba(245,200,66,0.35);
    border-radius: 10px;
    padding: 16px 24px;
    font-size: 1.2rem;
    font-weight: 700;
    color: #f5c842;
    margin-bottom: 24px;
    display: none;
    letter-spacing: 0.02em;
  }

  .modal-answer.show { display: block; }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    letter-spacing: 0.04em;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn:active { transform: scale(0.97); }

  .btn-reveal { background: #f5c842; color: #0a0e2e; }
  .btn-close { background: rgba(255,255,255,0.12); color: #fff; }

  .close-x {
    position: absolute;
    top: 14px;
    right: 18px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
  }

  .close-x:hover { color: #fff; }

  /* Daily Double easter egg */
  .dd-flash {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    color: #f5c842;
    animation: pulse 0.6s ease 3;
    display: none;
    margin-bottom: 12px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.08); }
  }

  .instructions {
    margin-top: 18px;
    font-size: 12px;
    color: rgba(255,255,255,0.28);
    text-align: center;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<h1>Smart Home Jeopardy</h1>
<p class="subtitle">MCOM 215 &mdash; Click a team score to make it active, then use + / &minus; to award points</p>

<!-- Score Bar -->
<div class="score-bar" id="scorebar"></div>

<!-- Board -->
<div class="board" id="board"></div>

<p class="instructions">Click any tile to reveal the clue &mdash; click "Show Answer" to reveal &mdash; press Esc to close</p>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="close-x" onclick="closeModal()">&#10005;</button>
    <div class="dd-flash" id="ddFlash">&#9733; DAILY DOUBLE &#9733;</div>
    <div class="modal-cat" id="modalCat"></div>
    <div class="modal-points" id="modalPoints"></div>
    <div class="modal-clue" id="modalClue"></div>
    <div class="modal-answer" id="modalAnswer"></div>
    <div class="modal-actions">
      <button class="btn btn-reveal" id="revealBtn" onclick="revealAnswer()">Show Answer</button>
      <button class="btn btn-close" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
const CATEGORIES = [
  "Voice & AI",
  "Smart Lighting",
  "Security Tech",
  "Climate Control",
  "Smart Appliances",
  "Protocols & Networks"
];

const AMOUNTS = [200, 400, 600, 800, 1000];

// [category][row] = { clue, answer, dailyDouble? }
const DATA = {
  "Voice & AI": [
    { clue: "This technology allows a smart speaker to activate by detecting a spoken phrase like 'Hey Alexa.'", answer: "What is a wake word?" },
    { clue: "Amazon's voice assistant, found in Echo devices, that controls smart home gadgets, plays music, and answers questions.", answer: "What is Alexa?" },
    { clue: "This Apple ecosystem lets iPhones, Macs, and HomePods control smart devices together.", answer: "What is HomeKit?" },
    { clue: "Beyond answering questions, modern voice assistants use this type of AI to understand context across multiple sentences in a conversation.", answer: "What is natural language processing (NLP)?" },
    { clue: "This concern leads many users to physically cover or disconnect their smart speakers when not in use.", answer: "What is privacy / always-on listening?" }
  ],
  "Smart Lighting": [
    { clue: "This brand's color-changing smart bulb system, launched in 2012, became the industry standard for smart lighting.", answer: "What is Philips Hue?" },
    { clue: "Smart bulbs connect to your home network using this protocol — the same one your phone uses for internet.", answer: "What is Wi-Fi?" },
    { clue: "This feature automatically dims your lights in the morning or turns them off at bedtime based on a preset schedule.", answer: "What is an automation / routine?" },
    { clue: "Lutron's smart lighting system is known for this type of device, which replaces standard wall switches.", answer: "What is a smart dimmer / smart switch?" },
    { clue: "This lighting concept, popular in home offices, adjusts color temperature throughout the day to match natural sunlight and reduce eye strain.", answer: "What is circadian or human-centric lighting?" }
  ],
  "Security Tech": [
    { clue: "Ring and Nest Hello are the two biggest brands in this category of smart home security hardware.", answer: "What is a video doorbell?" },
    { clue: "This smart security feature lets you unlock your door using only your smartphone — no physical key needed.", answer: "What is a smart lock / keyless entry?" },
    { clue: "Many smart security cameras now use this AI capability to tell the difference between a person, a pet, and a passing car.", answer: "What is object/person detection (AI recognition)?" },
    { clue: "This type of smart sensor placed on doors and windows sends an alert when a breach is detected.", answer: "What is a contact / entry sensor?" },
    { clue: "This smart home security feature, offered by companies like ADT and Ring, connects your home to professional responders 24/7.", answer: "What is professional monitoring?" }
  ],
  "Climate Control": [
    { clue: "This Nest feature learns your preferred temperatures over a week and programs itself automatically.", answer: "What is the learning algorithm / auto-schedule?" },
    { clue: "Smart thermostats communicate with HVAC systems using this standardized low-voltage wiring protocol found in most American homes.", answer: "What is the C-wire (common wire)?" },
    { clue: "This smart home device monitors CO2, VOCs, humidity, and particulate matter in your living space.", answer: "What is a smart air quality monitor?" },
    { clue: "Ecobee's smart thermostat includes these small wireless devices placed in other rooms to get a more accurate whole-home temperature reading.", answer: "What are room sensors / SmartSensors?" },
    { clue: "This feature lets a smart thermostat detect that everyone has left the house and automatically switch to an energy-saving mode.", answer: "What is geofencing / away mode?" }
  ],
  "Smart Appliances": [
    { clue: "This brand's robot vacuum uses onboard cameras and sensors to map your floor plan before cleaning.", answer: "What is Roomba (iRobot) or Roborock?" },
    { clue: "Samsung's Family Hub refrigerator features this on its door, allowing you to see inside your fridge remotely.", answer: "What is an internal camera / screen?" },
    { clue: "Smart washing machines can send you one of these when your laundry cycle is complete.", answer: "What is a push notification?" },
    { clue: "This smart kitchen device uses superheated air circulation and can be preheated remotely from a smartphone app.", answer: "What is a smart oven / connected air fryer?" },
    { clue: "This whole-home smart device, made by companies like Sense, clips onto your electrical panel to track energy use appliance by appliance.", answer: "What is a smart energy monitor?" }
  ],
  "Protocols & Networks": [
    { clue: "Released in 2022, this universal smart home standard backed by Apple, Google, Amazon, and Samsung lets devices from any brand work together.", answer: "What is Matter?" },
    { clue: "This low-power mesh networking protocol, used by Matter devices, lets smart gadgets relay signals to extend range around your home.", answer: "What is Thread?" },
    { clue: "These older wireless protocols, still widely used in smart home devices, operate on the 900 MHz band and avoid Wi-Fi interference.", answer: "What are Z-Wave and Zigbee?" },
    { clue: "Unlike a standard router, this type of home network uses multiple nodes spread around a home to eliminate dead zones.", answer: "What is a mesh Wi-Fi system?" },
    { clue: "This term describes the broader ecosystem that smart home technology belongs to — everyday objects connected to the internet and each other.", answer: "What is the Internet of Things (IoT)?" }
  ]
};

// Daily Double positions: [category, rowIndex] — pick 2 random-ish ones
const DAILY_DOUBLES = [
  ["Smart Appliances", 2],
  ["Protocols & Networks", 3]
];

function isDailyDouble(cat, row) {
  return DAILY_DOUBLES.some(([c, r]) => c === cat && r === row);
}

// Teams
const teams = [
  { name: "Team 1", score: 0 },
  { name: "Team 2", score: 0 },
  { name: "Team 3", score: 0 },
  { name: "Team 4", score: 0 }
];

let activeTeam = 0;
const used = {}; // key: "cat-row"

function buildScorebar() {
  const bar = document.getElementById('scorebar');
  bar.innerHTML = '';
  teams.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'team' + (i === activeTeam ? ' active' : '');
    div.onclick = () => { activeTeam = i; buildScorebar(); };
    div.innerHTML = `
      <div class="team-name">${t.name}</div>
      <div class="team-score" id="score${i}">$${t.score.toLocaleString()}</div>
      <div class="team-btns">
        <button onclick="event.stopPropagation(); adjustScore(${i}, currentPoints, 1)">+</button>
        <button onclick="event.stopPropagation(); adjustScore(${i}, currentPoints, -1)">−</button>
      </div>`;
    bar.appendChild(div);
  });
}

let currentPoints = 0;

function adjustScore(teamIdx, pts, dir) {
  teams[teamIdx].score += dir * pts;
  buildScorebar();
}

function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  CATEGORIES.forEach(cat => {
    const header = document.createElement('div');
    header.className = 'cat-header';
    header.textContent = cat;
    board.appendChild(header);
  });

  AMOUNTS.forEach((amt, row) => {
    CATEGORIES.forEach(cat => {
      const tile = document.createElement('div');
      const key = cat + '-' + row;
      tile.className = 'tile' + (used[key] ? ' used' : '');
      tile.id = 'tile-' + key;
      tile.innerHTML = `<span class="amount">$${amt}</span>`;
      if (!used[key]) {
        tile.onclick = () => openModal(cat, row, amt);
      }
      board.appendChild(tile);
    });
  });
}

function openModal(cat, row, amt) {
  const key = cat + '-' + row;
  used[key] = true;
  currentPoints = amt;

  const entry = DATA[cat][row];
  const dd = isDailyDouble(cat, row);

  document.getElementById('ddFlash').style.display = dd ? 'block' : 'none';
  if (dd) {
    document.getElementById('ddFlash').style.animation = 'none';
    void document.getElementById('ddFlash').offsetWidth;
    document.getElementById('ddFlash').style.animation = 'pulse 0.6s ease 3';
  }

  document.getElementById('modalCat').textContent = cat;
  document.getElementById('modalPoints').textContent = '$' + amt.toLocaleString();
  document.getElementById('modalClue').textContent = entry.clue;
  document.getElementById('modalAnswer').textContent = entry.answer;
  document.getElementById('modalAnswer').classList.remove('show');
  document.getElementById('revealBtn').style.display = 'inline-block';

  document.getElementById('overlay').classList.add('show');

  const tileEl = document.getElementById('tile-' + key);
  if (tileEl) tileEl.className = 'tile used';

  buildScorebar();
}

function revealAnswer() {
  document.getElementById('modalAnswer').classList.add('show');
  document.getElementById('revealBtn').style.display = 'none';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
  buildBoard();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

buildScorebar();
buildBoard();
</script>
</body>
</html>
